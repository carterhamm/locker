<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Locker</title>
</head>
<body>
  <!-- Login view -->
  <div id="login-view" class="view hidden">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <rect x="4" y="10" width="24" height="18" rx="3" stroke="white" stroke-width="2"/>
        <path d="M10 10V8a6 6 0 0 1 12 0v2" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="16" cy="19" r="2.5" fill="white"/>
        <rect x="15" y="20.5" width="2" height="3.5" rx="1" fill="white"/>
      </svg>
      <span class="logo-text">Locker</span>
    </div>
    <p class="subtitle" id="login-subtitle">Sign in to store keys</p>

    <form id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@company.com" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <div id="login-error" class="error hidden"></div>
      <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
      <button type="button" class="btn-ghost" id="toggle-mode" style="align-self:center;margin-top:2px">Create an account</button>
    </form>
  </div>

  <!-- Main view (store key) -->
  <div id="main-view" class="view hidden">
    <div class="header">
      <div class="logo-small">
        <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
          <rect x="4" y="10" width="24" height="18" rx="3" stroke="white" stroke-width="2"/>
          <path d="M10 10V8a6 6 0 0 1 12 0v2" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="19" r="2.5" fill="white"/>
          <rect x="15" y="20.5" width="2" height="3.5" rx="1" fill="white"/>
        </svg>
        <span class="logo-text-small">Locker</span>
      </div>
      <button id="logout-btn" class="btn-ghost">Logout</button>
    </div>

    <form id="store-form">
      <div class="field">
        <label>Name</label>
        <input type="text" id="service-name" placeholder="openai" required autofocus>
      </div>
      <div class="field">
        <label>API Key</label>
        <input type="password" id="api-key" placeholder="sk-..." required>
      </div>
      <div id="store-error" class="error hidden"></div>
      <div id="store-success" class="success hidden"></div>
      <button type="submit" class="btn-primary" id="store-btn">Store Key</button>
    </form>

    <div class="user-info" id="user-info"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
