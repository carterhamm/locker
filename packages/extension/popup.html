<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Locker</title>
</head>
<body>
  <!-- Login view -->
  <div id="login-view" class="view hidden">
    <div class="logo" style="flex-direction:column">
      <img src="icons/logo.png" alt="Locker" width="44" height="44" style="object-fit:contain">
      <span class="logo-text">Locker</span>
    </div>
    <p class="subtitle" id="login-subtitle">Sign in to store keys</p>

    <form id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@company.com" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <div id="login-error" class="error hidden"></div>
      <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
      <button type="button" class="btn-ghost" id="toggle-mode" style="align-self:center;margin-top:2px">Create an account</button>
    </form>
  </div>

  <!-- Main view (store key) -->
  <div id="main-view" class="view hidden">
    <div class="header">
      <div class="logo-small">
        <img src="icons/logo.png" alt="Locker" width="22" height="22" style="object-fit:contain">
        <span class="logo-text-small">Locker</span>
      </div>
      <button id="logout-btn" class="btn-ghost">Logout</button>
    </div>

    <form id="store-form" autocomplete="off">
      <div class="field">
        <label>Name</label>
        <input type="text" id="service-name" placeholder="openai" required autofocus autocomplete="off">
      </div>
      <div class="field">
        <label>API Key</label>
        <input type="text" id="api-key" placeholder="sk-..." required autocomplete="off" data-1p-ignore data-lpignore="true" style="-webkit-text-security: disc">
      </div>
      <div id="store-error" class="error hidden"></div>
      <button type="submit" class="btn-primary" id="store-btn">Store Key</button>
    </form>

    <div class="user-info" id="user-info"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
